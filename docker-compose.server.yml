version: '3.9'
services:
  backend:
    image: ${BACKEND_IMAGE}
    env_file:
      - ./.env.runtime
    environment:
      PORT: 5050
    ports:
      - '5050:5050'
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE}
    env_file:
      - ./.env.runtime
    environment:
      PORT: 3000
    depends_on:
      - backend
    ports:
      - '3000:3000'
    restart: unless-stopped
