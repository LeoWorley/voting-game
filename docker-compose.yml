version: '3.9'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - '5050:5050'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:5050
    depends_on:
      - backend
    ports:
      - '3000:3000'
    restart: unless-stopped
